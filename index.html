<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hwkim</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Pretendard", "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, #ffd6f3 0%, transparent 38%),
        radial-gradient(circle at 86% 16%, #c9ecff 0%, transparent 34%),
        radial-gradient(circle at 52% 92%, #fff1b8 0%, transparent 32%),
        #f7f7ff;
      color: #0f172a;
      display: grid;
      place-items: center;
      padding: clamp(12px, 3vw, 32px);
    }

    .app {
      width: min(920px, 100%);
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid #e8eaff;
      border-radius: 20px;
      padding: clamp(14px, 2.5vw, 28px);
    }

    #buttonList {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
      justify-content: center;
    }

    .keyword-btn {
      border: 1px solid var(--bd, #9bbcff);
      background: linear-gradient(135deg, var(--bg1, #fbe8ff) 0%, var(--bg2, #e8f0ff) 100%);
      color: var(--tx, #1e3a8a);
      border-radius: 14px;
      width: auto;
      min-height: 48px;
      padding: 12px 16px;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: default;
      text-align: center;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .keyword-btn:hover {
      transform: translateY(-2px);
      filter: saturate(1.08) contrast(1.02);
    }

    @media (max-width: 640px) {
      #buttonList {
        display: grid;
        grid-template-columns: 1fr;
      }

      .keyword-btn {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="buttonList" aria-label="생성된 단어 버튼 목록"></section>
  </main>

  <script>
    const buttonList = document.getElementById("buttonList");
    const keywordText = "PA tools 제작, follow line color 코드추출, PCA 컬러링 기능개발, 멀티플 믹스노드 기획, 에셋 컬러링 구조기획";
    const keywords = keywordText
      .split(",")
      .map((word) => word.trim())
      .filter(Boolean);
    // 여기 테마명만 바꾸면 전체 분위기가 바뀝니다.
    const themeName = "festival";
    const themePresets = {
      "vivid-pop": [
        { bg1: "#FFE3F5", bg2: "#F4D9FF", bd: "#E9B8FF", tx: "#7A1FA2" },
        { bg1: "#DFF4FF", bg2: "#DCEBFF", bd: "#AACDFF", tx: "#0F4FA8" },
        { bg1: "#E4FFE9", bg2: "#DFFFEF", bd: "#ACE8BE", tx: "#1B7A38" },
        { bg1: "#FFF1D9", bg2: "#FFE5A8", bd: "#FFC870", tx: "#9A4A00" },
        { bg1: "#FFE1E7", bg2: "#FFD5DE", bd: "#FFACBB", tx: "#B4234D" },
        { bg1: "#E8FFF9", bg2: "#D8FFFB", bd: "#9BEFE5", tx: "#0D7B71" }
      ],
      "neon-soft": [
        { bg1: "#F3DAFF", bg2: "#EEC9FF", bd: "#DE9DFF", tx: "#5F1E8D" },
        { bg1: "#D6F3FF", bg2: "#BCE8FF", bd: "#87D6FF", tx: "#0A4D85" },
        { bg1: "#E1FFD8", bg2: "#CCFFC0", bd: "#97F08E", tx: "#246C1E" },
        { bg1: "#FFF6C7", bg2: "#FFEB9A", bd: "#FFDC57", tx: "#8A5A00" },
        { bg1: "#FFE2F0", bg2: "#FFD3E7", bd: "#FFACD3", tx: "#90285D" },
        { bg1: "#E2F0FF", bg2: "#D0E5FF", bd: "#A3C8FF", tx: "#244F8C" }
      ],
      "festival": [
        { bg1: "#FFD7D7", bg2: "#FFC6A8", bd: "#FFA07A", tx: "#8F2E00" },
        { bg1: "#FFF2C9", bg2: "#FFE48E", bd: "#FFC85E", tx: "#8A4D00" },
        { bg1: "#D8FFD8", bg2: "#B5F2C9", bd: "#7ED9A4", tx: "#1F6B4B" },
        { bg1: "#D7F1FF", bg2: "#BCE5FF", bd: "#86CBFF", tx: "#12508B" },
        { bg1: "#E6DCFF", bg2: "#D9C7FF", bd: "#B9A0FF", tx: "#4B2EA3" },
        { bg1: "#FFDDF9", bg2: "#FBC8F2", bd: "#F49EE4", tx: "#8E2872" }
      ]
    };
    const palettes = themePresets[themeName] || themePresets["vivid-pop"];

    function createKeywordButton(text, index) {
      const value = text.trim();
      if (!value) {
        return;
      }

      const button = document.createElement("button");
      const color = palettes[index % palettes.length];
      button.type = "button";
      button.className = "keyword-btn";
      button.textContent = value;
      button.style.setProperty("--bg1", color.bg1);
      button.style.setProperty("--bg2", color.bg2);
      button.style.setProperty("--bd", color.bd);
      button.style.setProperty("--tx", color.tx);
      buttonList.appendChild(button);
    }

    keywords.forEach((word, index) => createKeywordButton(word, index));
  </script>
</body>
</html>
