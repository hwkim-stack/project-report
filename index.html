<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hwkim</title>
  <style>
    * { box-sizing: border-box; margin: 0; }

    body {
      min-height: 100vh;
      font-family: "Pretendard", "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, #ffd6f3 0%, transparent 38%),
        radial-gradient(circle at 86% 16%, #c9ecff 0%, transparent 34%),
        radial-gradient(circle at 52% 92%, #fff1b8 0%, transparent 32%),
        #f7f7ff;
      color: #0f172a;
      display: grid;
      place-items: center;
      padding: clamp(12px, 3vw, 32px);
    }

    .app {
      width: min(920px, 100%);
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid #e8eaff;
      border-radius: 20px;
      padding: clamp(14px, 2.5vw, 28px);
    }

    #featureList {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feature-card {
      border: 1px solid var(--bd);
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      border-radius: 14px;
      padding: 16px 22px;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .feature-card:hover {
      transform: translateY(-2px);
      filter: saturate(1.08) contrast(1.02);
    }

    .feature-title {
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      font-weight: 800;
      color: var(--tx);
    }

    .feature-desc {
      margin-top: 5px;
      font-size: clamp(0.84rem, 2.2vw, 0.94rem);
      font-weight: 400;
      color: var(--tx);
      opacity: 0.72;
      line-height: 1.55;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="featureList" aria-label="기능 목록"></section>
  </main>

  <script>
    /* ─────────────────────────────────────────────
       ✏️  VERSION을 수정할 때마다 1씩 올려주세요
       이것만 하면 캐시 문제 완전 해결됩니다
       ───────────────────────────────────────────── */
    const VERSION = 2;

    // 버전이 바뀌면 자동으로 강제 새로고침
    const lastVer = localStorage.getItem("app_version");
    if (lastVer && lastVer !== String(VERSION)) {
      localStorage.setItem("app_version", VERSION);
      location.reload(true);          // 서버에서 강제로 다시 받아옴
    } else {
      localStorage.setItem("app_version", VERSION);
    }

    /* =============================================
       ✏️  여기만 수정하세요!
       • 빈 줄로 항목 구분
       • 첫 줄 = 제목 (굵게)
       • 아래 줄 = 설명 (일반 텍스트)
       ============================================= */
    const featureText = `
PA tools
블렌더 및 네오피카소 편의기능 개발 (상시 업데이트)

PCA 컬러 그라데이션
네오피카소 컬러링 작업기능 개발

멀티플 믹스노드 기획
복수의 컬러 노드를 관리하는 기능 기획

에셋 컬러링 구조기획
컬러링 기능 기본설계

네오피카소 업무
개발 / 검수 / 교육 / 시연 등

Foramtion Separation
다양한 격자형태의 이착륙 레이어 분리기능 개발

SB limit unlock
수량 제한 우회버전 개발

불꽃배치도 및 export PDF 동기화
이륙대형 동기화 기능 개발

웹 버전) 이륙대형 모달 UI간 동기화
수정된 이륙대형이 모달 UI에 표시되지 않는 문제 수정

웹 버전) 불꽃신호 기능 수정
path viewer 에서 불꽃신호 보이지 않던 문제, 신호 슬롯 1/2로 차등 적용, 신호 길이 15프레임 등 수정

로컬 버전) 불꽃신호단차
방향 / 랜덤 등 단차기능 개발 (보간 개발예정)

로컬 버전) path3 구간추출
카드 단위 추출 기능 개발

웹 버전) 컬러링
웨이브 텍스처 기능 접목 및 타겟메시 기능 개발

PADSS 시나리오 파일
.scene 파일 변환 및 추출 기능 개발, 테스트용 PADSS path viewer 개발

path3 export 수정
트랜지션의 길이를 직선거리 예상치로 적용되는 부분을 transition.frames.length 기준으로 정확한 트랜지션 길이를 가지도록 수정

`;

    const themeName = "festival";
    const themePresets = {
      "vivid-pop": [
        { bg1: "#FFE3F5", bg2: "#F4D9FF", bd: "#E9B8FF", tx: "#7A1FA2" },
        { bg1: "#DFF4FF", bg2: "#DCEBFF", bd: "#AACDFF", tx: "#0F4FA8" },
        { bg1: "#E4FFE9", bg2: "#DFFFEF", bd: "#ACE8BE", tx: "#1B7A38" },
        { bg1: "#FFF1D9", bg2: "#FFE5A8", bd: "#FFC870", tx: "#9A4A00" },
        { bg1: "#FFE1E7", bg2: "#FFD5DE", bd: "#FFACBB", tx: "#B4234D" },
        { bg1: "#E8FFF9", bg2: "#D8FFFB", bd: "#9BEFE5", tx: "#0D7B71" }
      ],
      "neon-soft": [
        { bg1: "#F3DAFF", bg2: "#EEC9FF", bd: "#DE9DFF", tx: "#5F1E8D" },
        { bg1: "#D6F3FF", bg2: "#BCE8FF", bd: "#87D6FF", tx: "#0A4D85" },
        { bg1: "#E1FFD8", bg2: "#CCFFC0", bd: "#97F08E", tx: "#246C1E" },
        { bg1: "#FFF6C7", bg2: "#FFEB9A", bd: "#FFDC57", tx: "#8A5A00" },
        { bg1: "#FFE2F0", bg2: "#FFD3E7", bd: "#FFACD3", tx: "#90285D" },
        { bg1: "#E2F0FF", bg2: "#D0E5FF", bd: "#A3C8FF", tx: "#244F8C" }
      ],
      "festival": [
        { bg1: "#FFD7D7", bg2: "#FFC6A8", bd: "#FFA07A", tx: "#8F2E00" },
        { bg1: "#FFF2C9", bg2: "#FFE48E", bd: "#FFC85E", tx: "#8A4D00" },
        { bg1: "#D8FFD8", bg2: "#B5F2C9", bd: "#7ED9A4", tx: "#1F6B4B" },
        { bg1: "#D7F1FF", bg2: "#BCE5FF", bd: "#86CBFF", tx: "#12508B" },
        { bg1: "#E6DCFF", bg2: "#D9C7FF", bd: "#B9A0FF", tx: "#4B2EA3" },
        { bg1: "#FFDDF9", bg2: "#FBC8F2", bd: "#F49EE4", tx: "#8E2872" }
      ]
    };
    const palettes = themePresets[themeName] || themePresets["vivid-pop"];

    const features = featureText.trim().split(/\n\s*\n/).map(block => {
      const lines = block.trim().split("\n");
      return {
        title: lines[0].trim(),
        desc: lines.slice(1).map(l => l.trim()).join("\n")
      };
    }).filter(f => f.title);

    const list = document.getElementById("featureList");

    features.forEach((feat, i) => {
      const card = document.createElement("div");
      card.className = "feature-card";

      const c = palettes[i % palettes.length];
      card.style.setProperty("--bg1", c.bg1);
      card.style.setProperty("--bg2", c.bg2);
      card.style.setProperty("--bd", c.bd);
      card.style.setProperty("--tx", c.tx);

      const title = document.createElement("div");
      title.className = "feature-title";
      title.textContent = feat.title;
      card.appendChild(title);

      if (feat.desc) {
        const desc = document.createElement("div");
        desc.className = "feature-desc";
        desc.textContent = feat.desc;
        card.appendChild(desc);
      }

      list.appendChild(card);
    });
  </script>
</body>
</html>
