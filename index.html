<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hwkim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; }

    :root {
      color-scheme: dark;
      --term-bg: #060806;
      --term-panel: #0a0e0a;
      --term-panel2: #0f1510;
      --term-green: #3ecf8e;
      --term-green-bright: #5ef0a8;
      --term-green-dim: #4a8060;
      --term-fg: #c8f0d8;
      --term-fg-muted: #7a9a82;
      --term-amber: #e8b84a;
      --term-amber-dim: #a08030;
      --term-orange: #f97316;
      --term-orange-bright: #fb923c;
      --term-orange-glow: rgba(249, 115, 22, 0.45);
      --term-border: rgba(62, 207, 142, 0.35);
      --term-glow: rgba(62, 207, 142, 0.25);
    }

    body {
      min-height: 100vh;
      font-family: "JetBrains Mono", "D2Coding", "Consolas", "Malgun Gothic", ui-monospace, monospace;
      padding-top: calc(56px + env(safe-area-inset-top, 0px));
      background-color: var(--term-bg);
      background-image:
        radial-gradient(ellipse 100% 80% at 50% -20%, rgba(62, 207, 142, 0.06) 0%, transparent 45%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.25) 0%, transparent 12%, transparent 88%, rgba(0, 0, 0, 0.35) 100%);
      color: var(--term-fg);
      display: grid;
      place-items: center;
      padding: clamp(12px, 3vw, 32px);
    }

    .app {
      width: min(920px, 100%);
      background: rgba(10, 14, 10, 0.92);
      border: 1px solid var(--term-border);
      border-radius: 8px;
      padding: clamp(14px, 2.5vw, 28px);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.5) inset,
        0 16px 48px rgba(0, 0, 0, 0.55),
        0 0 32px var(--term-glow);
    }

    #featureList {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feature-card {
      position: relative;
      border: 1px solid var(--bd);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      border-radius: 6px;
      padding: 14px 18px;
      transition: transform 180ms ease, filter 180ms ease, box-shadow 220ms ease;
    }

    .feature-card:not(.feature-card--done)::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        180deg,
        rgba(62, 207, 142, 0.04) 0%,
        transparent 40%
      );
      pointer-events: none;
      z-index: 0;
    }

    .feature-card:not(.feature-card--done) {
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.4) inset,
        0 4px 20px rgba(0, 0, 0, 0.35);
    }

    .feature-card:not(.feature-card--done) .feature-title {
      position: relative;
      z-index: 1;
    }

    .feature-card:not(.feature-card--done) .feature-desc {
      z-index: 2;
    }

    .feature-card--dev {
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.4) inset,
        0 0 0 1px rgba(249, 115, 22, 0.5),
        0 4px 20px rgba(0, 0, 0, 0.35),
        0 0 24px rgba(249, 115, 22, 0.12);
    }

    .feature-card--dev::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        105deg,
        transparent 0%,
        transparent 28%,
        rgba(249, 115, 22, 0.07) 38%,
        rgba(251, 146, 60, 0.2) 44%,
        rgba(255, 180, 100, 0.38) 48.5%,
        rgba(255, 200, 120, 0.42) 50%,
        rgba(255, 180, 100, 0.38) 51.5%,
        rgba(251, 146, 60, 0.2) 56%,
        rgba(249, 115, 22, 0.07) 62%,
        transparent 72%,
        transparent 100%
      );
      background-size: 220% 100%;
      animation: dev-sweep 3.2s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes dev-sweep {
      0%, 100% { background-position: 130% 0; }
      50% { background-position: -30% 0; }
    }

    .feature-card:not(.feature-card--done):hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.4) inset,
        0 8px 28px rgba(0, 0, 0, 0.45),
        0 0 20px var(--term-glow);
    }

    .feature-card--dev:hover {
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.4) inset,
        0 0 0 1px rgba(249, 115, 22, 0.75),
        0 8px 28px rgba(0, 0, 0, 0.45),
        0 0 28px var(--term-orange-glow);
    }

    .feature-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px 14px;
      position: relative;
      z-index: 2;
    }

    .feature-head .feature-title {
      flex: 1 1 auto;
      min-width: 0;
    }

    .dev-pill {
      flex: 0 0 auto;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--term-amber);
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid rgba(232, 184, 74, 0.55);
      background: rgba(20, 16, 8, 0.85);
      background-size: 180% 100%;
      animation: dev-pill-shine 2.4s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(232, 184, 74, 0.12);
    }

    @keyframes dev-pill-shine {
      0%, 100% { background-position: 0% 50%; opacity: 0.88; }
      50% { background-position: 100% 50%; opacity: 1; }
    }

    .feature-card--done {
      overflow: hidden;
      isolation: isolate;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.45) inset,
        0 4px 20px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(74, 128, 90, 0.35);
    }

    .feature-card--done > .feature-title,
    .feature-card--done > .feature-desc {
      position: relative;
      z-index: 0;
    }

    .feature-card--done::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(4, 8, 6, 0.72);
      z-index: 1;
      pointer-events: none;
      transition: background 220ms ease;
    }

    .feature-card--done::after {
      content: "개발 완료";
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-size: clamp(1.1rem, 4.2vw, 1.55rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      font-family: inherit;
      color: rgba(62, 207, 142, 0.38);
      text-shadow: 0 0 24px rgba(62, 207, 142, 0.22);
      pointer-events: none;
      line-height: 1.25;
      text-align: center;
    }

    .feature-card--done:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.45) inset,
        0 8px 28px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(90, 160, 110, 0.45);
    }

    .feature-card--done:hover::before {
      background: rgba(4, 8, 6, 0.58);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .feature-card--dev::after,
      .dev-pill,
      .top-bar__btn-ring-path,
      .top-bar__chip-dot {
        animation: none !important;
      }
      .dev-pill {
        opacity: 0.85;
      }
      .top-bar__btn-inner {
        animation: none;
      }
    }

    .feature-title {
      font-size: clamp(0.92rem, 2.4vw, 1.05rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--tx);
    }

    .feature-desc {
      position: relative;
      z-index: 1;
      margin-top: 6px;
      font-size: clamp(0.78rem, 2vw, 0.88rem);
      font-weight: 400;
      color: var(--tx);
      opacity: 0.72;
      line-height: 1.55;
      white-space: pre-line;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: calc(10px + env(safe-area-inset-top, 0px)) clamp(14px, 4vw, 28px) 10px;
      background: rgba(6, 8, 6, 0.97);
      border-bottom: 1px solid var(--term-border);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .top-bar::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent,
        var(--term-green-dim),
        var(--term-green),
        var(--term-green-dim),
        transparent
      );
      opacity: 0.7;
      pointer-events: none;
    }

    .top-bar__inner {
      max-width: 920px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-bar__start {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .top-bar__actions {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      margin-left: auto;
    }

    .top-bar__btn-patch {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--term-fg-muted);
      border-radius: 4px;
      border: 1px solid rgba(100, 130, 110, 0.45);
      background: rgba(8, 12, 10, 0.9);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35) inset;
      transition: color 160ms ease, border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      cursor: pointer;
    }

    .top-bar__btn-patch:hover {
      color: var(--term-green-bright);
      border-color: rgba(62, 207, 142, 0.55);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.35) inset,
        0 0 16px rgba(62, 207, 142, 0.15);
      transform: translateY(-1px);
    }

    .top-bar__btn-patch:active {
      transform: translateY(0);
    }

    .top-bar__chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 10px;
      border-radius: 4px;
      background: var(--term-panel);
      border: 1px solid var(--term-border);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35) inset;
    }

    @keyframes term-cursor {
      0%, 45% { opacity: 1; }
      50%, 100% { opacity: 0.15; }
    }

    .top-bar__chip-dot {
      width: 2px;
      height: 14px;
      border-radius: 0;
      background: var(--term-green-bright);
      box-shadow: 0 0 6px var(--term-glow);
      flex-shrink: 0;
      animation: term-cursor 1.1s step-end infinite;
    }

    .top-bar__chip-text {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--term-fg-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .top-bar__chip-ver {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--term-green-bright);
      letter-spacing: 0.04em;
    }

    @keyframes dl-glow {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.5) inset,
          0 2px 16px rgba(62, 207, 142, 0.2),
          0 0 20px var(--term-glow);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.5) inset,
          0 4px 24px rgba(62, 207, 142, 0.35),
          0 0 28px rgba(62, 207, 142, 0.3);
      }
    }

    @keyframes dl-ring-trace {
      to { stroke-dashoffset: -100; }
    }

    .top-bar__btn {
      flex-shrink: 0;
      position: relative;
      display: inline-flex;
      align-items: stretch;
      justify-content: center;
      padding: 2px;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background: transparent;
      transition: filter 180ms ease, transform 180ms ease;
    }

    .top-bar__btn-border {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }

    .top-bar__btn-ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .top-bar__btn-ring-path {
      stroke-dashoffset: 0;
      animation: dl-ring-trace 0.9s linear infinite;
      filter: drop-shadow(0 0 2px rgba(62, 207, 142, 0.9))
        drop-shadow(0 0 4px rgba(62, 207, 142, 0.35));
    }

    .top-bar__btn-inner {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 18px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--term-green-bright);
      border-radius: 4px;
      border: 1px solid rgba(62, 207, 142, 0.5);
      background: linear-gradient(180deg, #0f1812 0%, #0a100c 100%);
      animation: dl-glow 2.5s ease-in-out infinite;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.45) inset,
        0 2px 16px rgba(62, 207, 142, 0.15),
        0 0 20px var(--term-glow);
    }

    .top-bar__btn-ico {
      font-size: 1.05rem;
      font-weight: 900;
      line-height: 1;
      opacity: 0.92;
    }

    .top-bar__btn:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    .top-bar__btn:hover .top-bar__btn-inner {
      animation: none;
      border-color: var(--term-green-bright);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.45) inset,
        0 4px 28px rgba(62, 207, 142, 0.35),
        0 0 32px rgba(62, 207, 142, 0.25);
    }

    .top-bar__btn:hover .top-bar__btn-ring-path {
      animation-play-state: paused;
      opacity: 0.88;
    }

    .top-bar__btn:active {
      transform: translateY(0);
      filter: brightness(1.02);
    }
  </style>
</head>
<body>
  <header class="top-bar" role="banner">
    <div class="top-bar__inner">
      <div class="top-bar__start">
        <div class="top-bar__chip">
          <span class="top-bar__chip-dot" aria-hidden="true"></span>
          <span class="top-bar__chip-text">최신버전</span>
          <strong id="topBarVersion" class="top-bar__chip-ver">0.6.1</strong>
        </div>
        <a id="topPatchNotesLink" class="top-bar__btn-patch" href="#">패치노트</a>
      </div>
      <div class="top-bar__actions">
      <a id="topDownloadLink" class="top-bar__btn" href="#">
        <span class="top-bar__btn-border" aria-hidden="true">
          <svg class="top-bar__btn-ring-svg" viewBox="0 0 200 48" preserveAspectRatio="none" overflow="visible">
            <defs>
              <linearGradient id="topBarBtnRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3ecf8e"/>
                <stop offset="45%" stop-color="#b8f0d0"/>
                <stop offset="100%" stop-color="#2a9a62"/>
              </linearGradient>
            </defs>
            <rect
              class="top-bar__btn-ring-path"
              pathLength="100"
              x="1.125"
              y="1.125"
              width="197.75"
              height="45.75"
              rx="12.375"
              ry="12.375"
              fill="none"
              stroke="url(#topBarBtnRingGrad)"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-dasharray="9 91"/>
          </svg>
        </span>
        <span class="top-bar__btn-inner">
          <span class="top-bar__btn-ico" aria-hidden="true">↓</span>
          Down
        </span>
      </a>
      </div>
    </div>
  </header>

  <main class="app">
    <section id="featureList" aria-label="기능 목록"></section>
  </main>

  <script>
    /* =============================================
       ✏️  여기만 수정하세요!
       • 빈 줄로 항목 구분
       • 첫 줄 = 제목 (굵게)
       • 아래 줄 = 설명 (일반 텍스트)
       • 개발 중: inDevelopmentTitles (첫 줄과 완전 일치)
       • 개발 완료: completedTitles — 카드 전체 딤 + 중앙 워터마크 (같은 제목이 둘 다 있으면 개발 중만 표시)
       • 상단 패널: DOWNLOAD_URL, PATCH_NOTES_URL, LATEST_VERSION
       ============================================= */
    const DOWNLOAD_URL = "https://example.com";
    const PATCH_NOTES_URL = "https://example.com/patch-notes";
    const LATEST_VERSION = "0.6.1";

    const featureText = `
(웹) PADSS 시나리오 파일 규격에 따른 연동 포맷 개발

(웹) firework layout 및 PDF 수정된 이륙대형으로 동기화

(웹) 수정된 대형과 모달 UI 간 동기화 작업 (기존 대형으로 표시되던 문제 수정)

(웹) path viewer에서 불꽃신호 보이지 않는 문제

(웹) 불꽃신호 슬롯 1, 2 나눠서 차등 적용되도록 수정

(웹) 불꽃신호 길이 15프레임으로 수정

(로컬) 불꽃신호 단차 기능

(웹) path3 부분추출 기능

(웹) 웨이브 텍스처 및 타겟메쉬 기능 (테스트)

(웹) padss 시나리오 파일 추출 변환기능

(웹) 테스트용 padss path viewer 개발

(웹) 불꽃 rematch 자동배정 기능 수정

(웹) 이륙대형 spacing (xy축 각각 제어)

(로컬) 다수의 포메이션 작업 기능 (A조 B조 시작지점 및 각각 패스 추출 등)

(로컬) 불꽃신호 단차, 보간 등 (구조 변경에 의한 재작업)

(로컬) 장면의 속도 시각화 (사각 픽셀 표시 등)

(로컬) 트랜지션 hook 제어연출 가능하나 속도 합산되어 방안 필요

(웹) parent 기능

(로컬/웹) path3 장면길이 오프셋 (앞으로 path3 관련 필요할지 검토필요)

(로컬) 이륙대형 불꽃배치도 동기화 (웹은 수정됨)

(로컬) 불꽃그룹 관리 편의성 체크

(웹) 기즈모 축 방향 블렌더처럼.

(웹) 분리비행 UI에 기즈모 추가

(로컬/웹) 분리비행 그룹별 속도제어 (필수 쪽에서 개발안되면)

(웹) path3 에셋 불러올 때 위치값 조정해도 적용되지 않음

(웹) 간단한 커스텀 오브젝트 배치 기능, Terra(obj) 등 지도 오브젝트 임포트

(웹) add scene 등 모든 모달창에서도 지도, 커스텀 오브젝트 등 표시 (토글 형식)

(웹) 플라이트 존 회전, 불러온 구글지도 회전 필요

(웹) 씬 에디터 등 모든 모달창 및 모든 곳에서 전체시간, 전체 프레임, 분초 단위 표시 필요

(웹) 블렌더처럼 정확하게 실측할 수 있는 부분 필요

(웹) 블렌더 선택툴(CIRCLE) 추가 및 단축키(G,R,S) 등 전체적인 편의성 점검

(웹) 구글지도 검색창에서 불러와지는 영역 표시

    /** @type {Set<string>} 반짝임 + 「개발 중…」 배지 (첫 줄과 완전 일치) */
    const inDevelopmentTitles = new Set([
      "(로컬) 불꽃신호 단차, 보간 등 (구조 변경에 의한 재작업)",
    ]);

    /** @type {Set<string>} 「개발 완료」 배지 (inDevelopmentTitles에도 있으면 개발 중만 표시) */
    const completedTitles = new Set([
      "(웹) PADSS 시나리오 파일 규격에 따른 연동 포맷 개발",
      "(웹) firework layout 및 PDF 수정된 이륙대형으로 동기화",
      "(웹) 수정된 대형과 모달 UI 간 동기화 작업 (기존 대형으로 표시되던 문제 수정)",
      "(웹) path viewer에서 불꽃신호 보이지 않는 문제",
      "(웹) 불꽃신호 슬롯 1, 2 나눠서 차등 적용되도록 수정",
      "(웹) 불꽃신호 길이 15프레임으로 수정",
      "(로컬) 불꽃신호 단차 기능",
      "(웹) path3 부분추출 기능",
      "(웹) 웨이브 텍스처 및 타겟메쉬 기능 (테스트)",
      "(웹) padss 시나리오 파일 추출 변환기능",
      "(웹) 테스트용 padss path viewer 개발",
      "(웹) 불꽃 rematch 자동배정 기능 수정",
      "(웹) 이륙대형 spacing (xy축 각각 제어)",
    ]);

    const themeName = "cosmos";
    const themePresets = {
      "vivid-pop": [
        { bg1: "#FFE3F5", bg2: "#F4D9FF", bd: "#E9B8FF", tx: "#7A1FA2" },
        { bg1: "#DFF4FF", bg2: "#DCEBFF", bd: "#AACDFF", tx: "#0F4FA8" },
        { bg1: "#E4FFE9", bg2: "#DFFFEF", bd: "#ACE8BE", tx: "#1B7A38" },
        { bg1: "#FFF1D9", bg2: "#FFE5A8", bd: "#FFC870", tx: "#9A4A00" },
        { bg1: "#FFE1E7", bg2: "#FFD5DE", bd: "#FFACBB", tx: "#B4234D" },
        { bg1: "#E8FFF9", bg2: "#D8FFFB", bd: "#9BEFE5", tx: "#0D7B71" }
      ],
      "neon-soft": [
        { bg1: "#F3DAFF", bg2: "#EEC9FF", bd: "#DE9DFF", tx: "#5F1E8D" },
        { bg1: "#D6F3FF", bg2: "#BCE8FF", bd: "#87D6FF", tx: "#0A4D85" },
        { bg1: "#E1FFD8", bg2: "#CCFFC0", bd: "#97F08E", tx: "#246C1E" },
        { bg1: "#FFF6C7", bg2: "#FFEB9A", bd: "#FFDC57", tx: "#8A5A00" },
        { bg1: "#FFE2F0", bg2: "#FFD3E7", bd: "#FFACD3", tx: "#90285D" },
        { bg1: "#E2F0FF", bg2: "#D0E5FF", bd: "#A3C8FF", tx: "#244F8C" }
      ],
      "cosmosActive": [
        { bg1: "#0a0c0a", bg2: "#0e120e", bd: "rgba(90, 200, 130, 0.4)", tx: "#b8e8c8" }
      ],
      "cosmosDone": [
        { bg1: "#070907", bg2: "#0a0e0a", bd: "rgba(65, 120, 88, 0.45)", tx: "#6e9a7e" }
      ]
    };
    function getPaletteList(name, showDone) {
      if (name === "cosmos") {
        return showDone ? themePresets.cosmosDone : themePresets.cosmosActive;
      }
      return themePresets[name] || themePresets.cosmosActive;
    }

    const features = featureText.trim().split(/\n\s*\n/).map(block => {
      const lines = block.trim().split("\n");
      return {
        title: lines[0].trim(),
        desc: lines.slice(1).map(l => l.trim()).join("\n")
      };
    }).filter(f => f.title);

    const list = document.getElementById("featureList");

    features.forEach((feat, i) => {
      const card = document.createElement("div");
      card.className = "feature-card";

      const title = document.createElement("div");
      title.className = "feature-title";
      title.textContent = feat.title;

      const showDev = inDevelopmentTitles.has(feat.title);
      const showDone = completedTitles.has(feat.title) && !showDev;

      const palettes = getPaletteList(themeName, showDone);
      const c = palettes[i % palettes.length];
      card.style.setProperty("--bg1", c.bg1);
      card.style.setProperty("--bg2", c.bg2);
      card.style.setProperty("--bd", c.bd);
      card.style.setProperty("--tx", c.tx);

      if (showDev) {
        card.classList.add("feature-card--dev");
        const head = document.createElement("div");
        head.className = "feature-head";
        head.appendChild(title);
        const pill = document.createElement("span");
        pill.className = "dev-pill";
        pill.setAttribute("role", "status");
        pill.textContent = "개발 중…";
        head.appendChild(pill);
        card.appendChild(head);
      } else if (showDone) {
        card.classList.add("feature-card--done");
        const doneSr = document.createElement("span");
        doneSr.className = "sr-only";
        doneSr.setAttribute("role", "status");
        doneSr.textContent = "개발 완료";
        card.appendChild(doneSr);
        card.appendChild(title);
      } else {
        card.appendChild(title);
      }

      if (feat.desc) {
        const desc = document.createElement("div");
        desc.className = "feature-desc";
        desc.textContent = feat.desc;
        card.appendChild(desc);
      }

      list.appendChild(card);
    });

    (function initTopBar() {
      const verEl = document.getElementById("topBarVersion");
      const dlEl = document.getElementById("topDownloadLink");
      const patchEl = document.getElementById("topPatchNotesLink");
      if (verEl) verEl.textContent = LATEST_VERSION;
      if (dlEl) {
        dlEl.href = DOWNLOAD_URL || "#";
        dlEl.target = "_blank";
        dlEl.rel = "noopener noreferrer";
        dlEl.setAttribute("aria-label", "다운로드 페이지로 이동");
      }
      if (patchEl) {
        patchEl.href = PATCH_NOTES_URL || "#";
        patchEl.target = "_blank";
        patchEl.rel = "noopener noreferrer";
        patchEl.setAttribute("aria-label", "패치노트 페이지로 이동");
      }
    })();
  </script>
